name: db-backup-all

# Sauvegarde automatique de TOUTES les DBs hébergées sur le Postgres partagé
# du NAS (MangaTracker, zenflow, et toute future DB).
#
# Stockage en double :
#   1. NAS : ~/manga-tracker-backups/  (30 derniers dumps par DB)
#   2. GitHub Artifacts off-site : 90 jours (résiste à la perte du NAS)
#
# Déclenchement : tous les jours à 03h00 UTC + manuel + à chaque édition
# de ce workflow (= sanity test).

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC = ~04h-05h heure Paris
  workflow_dispatch:       # déclenchement manuel depuis GitHub UI
  push:                    # tourne aussi quand on modifie ce workflow
    paths:                 # (force GitHub à enregistrer le workflow + sanity test)
      - '.github/workflows/db-backup.yml'

jobs:
  backup:
    name: pg_dump toutes DBs + Artifact off-site
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Generate timestamp
        id: ts
        run: echo "ts=$(date -u +%Y-%m-%d_%H-%M)" >> "$GITHUB_OUTPUT"

      - name: Backup via SSH — pg_dump toutes DBs (Postgres partagé + Nextcloud) + tarball
        uses: appleboy/ssh-action@v1
        env:
          DATABASE_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          TS: ${{ steps.ts.outputs.ts }}
        with:
          host: ${{ secrets.NAS_HOST }}
          port: ${{ secrets.NAS_PORT }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          envs: DATABASE_PASSWORD,TS
          script: |
            set -euo pipefail

            BACKUP_DIR="$HOME/manga-tracker-backups"
            mkdir -p "$BACKUP_DIR"

            # Cleanup d'éventuels artefacts d'un run précédent foireux
            rm -f "$BACKUP_DIR"/*$'\n'* 2>/dev/null || true

            ###########################################################
            # 1. Postgres partagé (MangaTracker, zenflow, futures DBs)
            ###########################################################
            sudo docker run --rm --network host \
              -e PGPASSWORD="$DATABASE_PASSWORD" \
              postgres:17 \
              psql -h 127.0.0.1 -U postgres -At \
                -c "SELECT datname FROM pg_database WHERE datname NOT IN ('postgres','template0','template1');" \
              > /tmp/dbs.list

            echo "DBs Postgres partagé :"
            cat /tmp/dbs.list

            while IFS= read -r DB; do
              [ -z "$DB" ] && continue
              BACKUP_FILE="$BACKUP_DIR/${DB}_${TS}.dump"
              echo "▶ Backup $DB → $BACKUP_FILE"

              sudo docker run --rm --network host \
                -e PGPASSWORD="$DATABASE_PASSWORD" \
                postgres:17 \
                pg_dump -h 127.0.0.1 -U postgres -d "$DB" \
                  --format=custom --compress=9 --no-owner --no-acl \
                > "$BACKUP_FILE"

              BYTES=$(stat -c%s "$BACKUP_FILE")
              echo "  ✓ $DB : $(du -sh "$BACKUP_FILE" | cut -f1) ($BYTES bytes)"

              if [ "$BYTES" -lt 5000 ]; then
                echo "::error::Dump $DB suspectement petit ($BYTES bytes) — abort"
                exit 1
              fi

              # Rotation : 30 derniers dumps par DB
              ls -t "$BACKUP_DIR"/${DB}_*.dump 2>/dev/null | tail -n +31 | xargs -r rm -f
            done < /tmp/dbs.list
            rm -f /tmp/dbs.list

            ###########################################################
            # 2. Nextcloud Postgres (container séparé)
            #    Best-effort : si le container n'est pas up, on skip.
            ###########################################################
            if sudo docker ps --filter name=ix-nextcloud-postgres-1 --format '{{.Names}}' | grep -q nextcloud-postgres; then
              echo "▶ Backup Nextcloud DB"
              NC_FILE="$BACKUP_DIR/nextcloud_${TS}.dump"
              sudo docker exec ix-nextcloud-postgres-1 \
                pg_dump -U nextcloud -d nextcloud \
                  --format=custom --compress=9 --no-owner --no-acl \
                  -f /tmp/nc_${TS}.dump
              sudo docker cp "ix-nextcloud-postgres-1:/tmp/nc_${TS}.dump" "$NC_FILE"
              sudo docker exec ix-nextcloud-postgres-1 rm -f /tmp/nc_${TS}.dump

              BYTES=$(stat -c%s "$NC_FILE")
              echo "  ✓ nextcloud : $(du -sh "$NC_FILE" | cut -f1) ($BYTES bytes)"
              if [ "$BYTES" -lt 5000 ]; then
                echo "::error::Dump nextcloud suspectement petit ($BYTES bytes) — abort"
                exit 1
              fi
              ls -t "$BACKUP_DIR"/nextcloud_*.dump 2>/dev/null | tail -n +31 | xargs -r rm -f
            else
              echo "::warning::Nextcloud Postgres container pas up — backup Nextcloud skip"
            fi

            ###########################################################
            # 3. Tarball tous les dumps de ce timestamp (1 fichier à
            #    download = pas de souci wildcard SCP)
            ###########################################################
            cd "$BACKUP_DIR"
            tar czf "/tmp/db-backup-${TS}.tar.gz" *_${TS}.dump
            ls -lh "/tmp/db-backup-${TS}.tar.gz"

      - name: Récupérer le tarball pour Artifact off-site
        uses: nicklasfrahm/scp-action@main
        with:
          direction: download
          host: ${{ secrets.NAS_HOST }}
          port: ${{ secrets.NAS_PORT }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          insecure_ignore_fingerprint: true
          source: /tmp/db-backup-${{ steps.ts.outputs.ts }}.tar.gz
          target: ./db-backup-${{ steps.ts.outputs.ts }}.tar.gz

      - name: Vérifier le tarball récupéré + extraire
        run: |
          ls -lh ./db-backup-${{ steps.ts.outputs.ts }}.tar.gz
          BYTES=$(stat -c%s ./db-backup-${{ steps.ts.outputs.ts }}.tar.gz)
          if [ "$BYTES" -lt 5000 ]; then
            echo "::error::Tarball invalide ($BYTES bytes)"
            exit 1
          fi
          tar tzf ./db-backup-${{ steps.ts.outputs.ts }}.tar.gz
          mkdir -p ./extracted
          tar xzf ./db-backup-${{ steps.ts.outputs.ts }}.tar.gz -C ./extracted
          ls -lh ./extracted/

      - name: Upload Artifact GitHub (off-site, rétention 90j)
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ steps.ts.outputs.ts }}
          path: ./extracted/*.dump
          retention-days: 90

      - name: Cleanup tarball sur le NAS
        if: always()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.NAS_HOST }}
          port: ${{ secrets.NAS_PORT }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          script: rm -f /tmp/db-backup-*.tar.gz

      - name: Résumé GitHub
        if: always()
        run: |
          {
            echo "### 📦 DB Backup ALL — ${{ steps.ts.outputs.ts }}"
            echo ""
            echo "- **Postgres** : 192.168.1.119:5432 (service partagé NAS)"
            echo "- **DBs dumpées** : MangaTracker, zenflow (et toute future DB user-créée)"
            echo "- **Stockage NAS** : \`~/manga-tracker-backups/<db>_<ts>.dump\` (rétention 30 derniers par DB)"
            echo "- **GitHub Artifact** : \`db-backup-${{ steps.ts.outputs.ts }}\` (rétention 90 jours, off-site)"
            echo ""
            echo "**Restauration depuis Artifact :**"
            echo '```bash'
            echo "gh run download <run-id> -n db-backup-${{ steps.ts.outputs.ts }}"
            echo "# Puis pour chaque DB :"
            echo "pg_restore --clean -h 192.168.1.119 -U postgres -d <db_name> <db_name>_<ts>.dump"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
