name: db-backup-all

# Sauvegarde automatique de TOUTES les DBs hébergées sur le Postgres partagé
# du NAS (MangaTracker, zenflow, et toute future DB).
#
# Stockage en double :
#   1. NAS : ~/manga-tracker-backups/  (30 derniers dumps par DB)
#   2. GitHub Artifacts off-site : 90 jours (résiste à la perte du NAS)
#
# Déclenchement : tous les jours à 03h00 UTC + manuel + à chaque édition
# de ce workflow (= sanity test).

on:
  schedule:
    - cron: '0 3 * * *'   # 03:00 UTC = ~04h-05h heure Paris
  workflow_dispatch:       # déclenchement manuel depuis GitHub UI
  push:                    # tourne aussi quand on modifie ce workflow
    paths:                 # (force GitHub à enregistrer le workflow + sanity test)
      - '.github/workflows/db-backup.yml'

jobs:
  backup:
    name: pg_dump toutes DBs + Artifact off-site
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Generate timestamp
        id: ts
        run: echo "ts=$(date -u +%Y-%m-%d_%H-%M)" >> "$GITHUB_OUTPUT"

      - name: Backup via SSH — pg_dump de toutes les DBs user
        uses: appleboy/ssh-action@v1
        env:
          DATABASE_PASSWORD: ${{ secrets.PROD_DB_PASSWORD }}
          TS: ${{ steps.ts.outputs.ts }}
        with:
          host: ${{ secrets.NAS_HOST }}
          port: ${{ secrets.NAS_PORT }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          envs: DATABASE_PASSWORD,TS
          script: |
            set -euo pipefail

            BACKUP_DIR="$HOME/manga-tracker-backups"
            mkdir -p "$BACKUP_DIR"

            # Liste les DBs user (exclut postgres + template0/1)
            # Stockée dans un fichier pour itération propre par ligne
            # (un `for DB in $DBS` aurait splité incorrectement les newlines)
            sudo docker run --rm --network host \
              -e PGPASSWORD="$DATABASE_PASSWORD" \
              postgres:17 \
              psql -h 127.0.0.1 -U postgres -At \
                -c "SELECT datname FROM pg_database WHERE datname NOT IN ('postgres','template0','template1');" \
              > /tmp/dbs.list

            echo "DBs à dump :"
            cat /tmp/dbs.list

            # Cleanup éventuels artefacts d'un run précédent foireux
            rm -f "$BACKUP_DIR"/*$'\n'* 2>/dev/null || true

            while IFS= read -r DB; do
              [ -z "$DB" ] && continue
              BACKUP_FILE="$BACKUP_DIR/${DB}_${TS}.dump"
              echo "▶ Backup $DB → $BACKUP_FILE"

              sudo docker run --rm --network host \
                -e PGPASSWORD="$DATABASE_PASSWORD" \
                postgres:17 \
                pg_dump -h 127.0.0.1 -U postgres -d "$DB" \
                  --format=custom --compress=9 --no-owner --no-acl \
                > "$BACKUP_FILE"

              BYTES=$(stat -c%s "$BACKUP_FILE")
              SIZE=$(du -sh "$BACKUP_FILE" | cut -f1)
              echo "  ✓ $DB : $SIZE ($BYTES bytes)"

              # Sanity : 5 KB minimum (header + au moins une table)
              if [ "$BYTES" -lt 5000 ]; then
                echo "::error::Dump $DB suspectement petit ($BYTES bytes) — abort"
                exit 1
              fi

              # Rotation : 30 derniers dumps par DB
              ls -t "$BACKUP_DIR"/${DB}_*.dump 2>/dev/null | tail -n +31 | xargs -r rm -f
            done < /tmp/dbs.list

            rm -f /tmp/dbs.list

            # Rotation aussi pour Nextcloud_RECOVERY_*, Zenflow_RECOVERY_*, etc.
            # (les dumps manuels marqués _RECOVERY_ sont conservés)

            echo ""
            echo "📦 Dumps total dans $BACKUP_DIR :"
            ls -lh "$BACKUP_DIR"/*.dump 2>/dev/null | tail -20

      - name: Récupérer les dumps pour Artifact off-site
        uses: nicklasfrahm/scp-action@main
        with:
          direction: download
          host: ${{ secrets.NAS_HOST }}
          port: ${{ secrets.NAS_PORT }}
          username: ${{ secrets.NAS_USER }}
          key: ${{ secrets.NAS_SSH_KEY }}
          insecure_ignore_fingerprint: true
          source: ~/manga-tracker-backups/*_${{ steps.ts.outputs.ts }}.dump
          target: ./

      - name: Vérifier les dumps récupérés
        run: |
          ls -lh ./*_${{ steps.ts.outputs.ts }}.dump
          for f in ./*_${{ steps.ts.outputs.ts }}.dump; do
            BYTES=$(stat -c%s "$f")
            if [ "$BYTES" -lt 5000 ]; then
              echo "::error::Dump $f invalide ($BYTES bytes)"
              exit 1
            fi
          done

      - name: Upload Artifact GitHub (off-site, rétention 90j)
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ steps.ts.outputs.ts }}
          path: ./*_${{ steps.ts.outputs.ts }}.dump
          retention-days: 90

      - name: Résumé GitHub
        if: always()
        run: |
          {
            echo "### 📦 DB Backup ALL — ${{ steps.ts.outputs.ts }}"
            echo ""
            echo "- **Postgres** : 192.168.1.119:5432 (service partagé NAS)"
            echo "- **DBs dumpées** : MangaTracker, zenflow (et toute future DB user-créée)"
            echo "- **Stockage NAS** : \`~/manga-tracker-backups/<db>_<ts>.dump\` (rétention 30 derniers par DB)"
            echo "- **GitHub Artifact** : \`db-backup-${{ steps.ts.outputs.ts }}\` (rétention 90 jours, off-site)"
            echo ""
            echo "**Restauration depuis Artifact :**"
            echo '```bash'
            echo "gh run download <run-id> -n db-backup-${{ steps.ts.outputs.ts }}"
            echo "# Puis pour chaque DB :"
            echo "pg_restore --clean -h 192.168.1.119 -U postgres -d <db_name> <db_name>_<ts>.dump"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
