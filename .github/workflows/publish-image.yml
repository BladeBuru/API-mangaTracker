name: CI/CD Build & Publish Image

on:
  push:
    branches: [ "master", "dev" ]

env:
  BASE_BRANCH_NAME: ${{ github.base_ref || github.ref_name }}
  BRANCH_NAME: ${BASE_BRANCH_NAME//\//-}

permissions:
  contents: read
  packages: write

jobs:
  publish-manga-tracker-api-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Docker image
        run: |
          IMAGE=bladeburu/manga-tracker-api:${{ env.BRANCH_NAME }}-latest
          docker build --target production -t $IMAGE .
          docker push $IMAGE

      - name: Rollout on NAS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            # Ici, ton script rollout.sh doit :
            # 1) docker pull bladeburu/manga-tracker-api:${{ env.BRANCH_NAME }}-latest
            # 2) docker stop mgt-app || true
            # 3) docker rm mgt-app || true
            # 4) docker run -d --name mgt-app \
            #       -p 9000:3000 \
            #       bladeburu/manga-tracker-api:${{ env.BRANCH_NAME }}-latest
            /home/admin/rollout.sh mgt-app ${{ env.BRANCH_NAME }}-latest
       
            
