name: CI/CD Build & Publish Image

on:
  push:
    branches: [ "master", "integration", "cicd/integration-env" ]

env:
  BASE_BRANCH_NAME: ${{ github.base_ref || github.ref_name }}
  BRANCH_NAME: ${BASE_BRANCH_NAME//\//-}

permissions: write-all

jobs:
  publish-manga-tracker-api-image:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - 
        name: Checkout
        uses: actions/checkout@v3
      - 
        name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - 
        name: Build, Run & Publish Docker image
        run: |
          docker build -t ghcr.io/flt-yann/manga-tracker-api:${{ env.BRANCH_NAME }}-latest .
          docker run -d -p 80:80 ghcr.io/flt-yann/manga-tracker-api:${{ env.BRANCH_NAME }}-latest
          docker push ghcr.io/flt-yann/manga-tracker-api:${{ env.BRANCH_NAME }}-latest
