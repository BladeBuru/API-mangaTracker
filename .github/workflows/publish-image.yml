name: CI/CD Build & Publish Image

on:
  push:
    branches: [ "master", "integration", "dev" ]

permissions: write-all

jobs:
  publish-manga-tracker-api-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set branch environment variables
        run: |
          BASE_BRANCH_NAME="${GITHUB_BASE_REF:-${GITHUB_REF_NAME}}"
          BRANCH_NAME="${BASE_BRANCH_NAME//\//-}"
          echo "BASE_BRANCH_NAME=$BASE_BRANCH_NAME" >> $GITHUB_ENV
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV

     

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Docker image
        run: |
          TIMESTAMP=$(date +'%Y%m%d%H%M')
          TAG=${{ env.BRANCH_NAME }}-$TIMESTAMP

          IMAGE=bladeburu/manga-tracker-api:$TAG
          docker build --target production -t $IMAGE .
          docker push $IMAGE
          echo "DEPLOY_TAG=$TAG" >> $GITHUB_ENV

      - name: Rollout on NAS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: | 
            set -x
            TAG="$DEPLOY_TAG"
            echo "▶ Deploying image tag: $TAG"
            bash /home/admin/rollout.sh manga-tracker-api "$TAG"
