name: Source Code Formatting & Linting

on:
  push:
    branches: ["dev"]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      -
        name: Checkout
        uses: actions/checkout@v3
      -
        name: Install Packages
        run: npm ci
      -
        name: Code Formatting
        run: npm run format
      -
        name: Code Linting
        run: npm run lint
